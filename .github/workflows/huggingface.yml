name: Sync to Hugging Face hub
on:
  push:
    branches:
      - main
      - '*'

  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          rm -rf .git
          git init -b main
          git config --global user.email "bot@example.com"
          git config --global user.name "Bot"
          git lfs install
          echo "*.png filter=lfs diff=lfs merge=lfs -text" > .gitattributes
          echo "*.jpg filter=lfs diff=lfs merge=lfs -text" >> .gitattributes
          echo "*.jpeg filter=lfs diff=lfs merge=lfs -text" >> .gitattributes
          echo "*.gif filter=lfs diff=lfs merge=lfs -text" >> .gitattributes
          echo "*.pth filter=lfs diff=lfs merge=lfs -text" >> .gitattributes
          echo "*.bin filter=lfs diff=lfs merge=lfs -text" >> .gitattributes
          git add .
          git commit -m "Deploy to Hugging Face Space"
          git remote add space https://applepie69:$HF_TOKEN@huggingface.co/spaces/applepie69/TripoSR
          git push -f space main
